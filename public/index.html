<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #ebebeb;
  height: 100vh;
  overflow: hidden;
  color: #111;
  -webkit-font-smoothing: antialiased;
}

/* ── UPLOAD ─────────────────────────────────── */
#upload-screen {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

#drop-zone {
  background: #fff;
  border: 2px dashed #c0c0c0;
  border-radius: 8px;
  padding: 72px 112px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  user-select: none;
}
#drop-zone:hover, #drop-zone.over {
  border-color: #000;
  background: #fafafa;
}
#drop-zone svg {
  display: block;
  margin: 0 auto 20px;
  opacity: 0.25;
}
#drop-zone h1 {
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 6px;
  letter-spacing: -0.01em;
}
#drop-zone p { font-size: 13px; color: #999; }
#file-input { display: none; }

/* ── EDITOR ─────────────────────────────────── */
#editor-screen {
  display: none;
  flex-direction: column;
  height: 100vh;
}

#toolbar {
  height: 50px;
  background: #fff;
  border-bottom: 1px solid #ddd;
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 8px;
  flex-shrink: 0;
}

#file-name {
  flex: 1;
  font-size: 13px;
  color: #777;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
}

.btn {
  height: 32px;
  padding: 0 14px;
  border-radius: 5px;
  border: 1.5px solid #000;
  background: #fff;
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  letter-spacing: 0.01em;
  transition: background 0.1s, color 0.1s;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.btn:hover { background: #000; color: #fff; }
.btn.active { background: #000; color: #fff; }

.btn-ghost {
  border-color: #d0d0d0;
  color: #666;
}
.btn-ghost:hover { background: #f2f2f2; color: #111; border-color: #bbb; }

.btn-primary { background: #000; color: #fff; }
.btn-primary:hover { background: #222; }

/* sign-hint: text shown below toolbar when sign mode is on */
#sign-hint {
  display: none;
  background: #111;
  color: #fff;
  text-align: center;
  font-size: 12px;
  padding: 6px;
  letter-spacing: 0.03em;
}
#sign-hint.show { display: block; }

/* ── VIEWER ─────────────────────────────────── */
#viewer {
  flex: 1;
  overflow: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 28px 28px 48px;
  gap: 24px;
}
#viewer.sign-mode { cursor: crosshair; }

.page-wrap {
  position: relative;
  background: #fff;
  box-shadow: 0 2px 16px rgba(0,0,0,0.14);
}
.page-canvas { display: block; }

.sig-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
#viewer.sign-mode .sig-layer {
  pointer-events: all;
  cursor: crosshair;
}

/* placed signature item */
.sig-item {
  position: absolute;
  cursor: move;
  user-select: none;
}
.sig-item img {
  display: block;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
.sig-del {
  position: absolute;
  top: -9px;
  right: -9px;
  width: 20px;
  height: 20px;
  background: #111;
  color: #fff;
  border: none;
  border-radius: 50%;
  font-size: 13px;
  line-height: 20px;
  text-align: center;
  cursor: pointer;
  display: none;
  padding: 0;
  font-weight: 400;
}
.sig-item:hover .sig-del { display: block; }

/* ── SIGNATURE MODAL ────────────────────────── */
#sig-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#sig-modal.open { display: flex; }

#sig-box {
  background: #fff;
  border-radius: 8px;
  padding: 28px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.2);
}
#sig-box h2 {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.01em;
}

#sig-canvas-wrap {
  position: relative;
  border: 1.5px solid #000;
  border-radius: 4px;
  overflow: hidden;
}
#sig-canvas {
  display: block;
  background: #fff;
  cursor: crosshair;
  touch-action: none;
}
/* baseline */
#sig-canvas-wrap::after {
  content: '';
  position: absolute;
  bottom: 28px;
  left: 20px;
  right: 20px;
  border-bottom: 1px solid #e0e0e0;
  pointer-events: none;
}
.sig-placeholder {
  position: absolute;
  bottom: 32px;
  left: 0; right: 0;
  text-align: center;
  font-size: 12px;
  color: #ccc;
  pointer-events: none;
  transition: opacity 0.2s;
}
.sig-placeholder.hidden { opacity: 0; }

#sig-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
#sig-footer .right { display: flex; gap: 8px; }

/* ── LOADING ────────────────────────────────── */
#loading {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.75);
  z-index: 200;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: #555;
}
#loading.show { display: flex; }
</style>
</head>
<body>

<div id="loading">Chargement…</div>

<!-- ══ UPLOAD SCREEN ══════════════════════════ -->
<div id="upload-screen">
  <div id="drop-zone">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="12" y1="12" x2="12" y2="18"/>
      <line x1="9"  y1="15" x2="15" y2="15"/>
    </svg>
    <h1>Déposez votre document ici</h1>
    <p>PDF · Word · ODT — ou cliquez pour choisir</p>
    <input type="file" id="file-input" accept=".pdf,.doc,.docx,.odt,.ods,.ppt,.pptx">
  </div>
</div>

<!-- ══ EDITOR SCREEN ══════════════════════════ -->
<div id="editor-screen">
  <div id="toolbar">
    <span id="file-name"></span>
    <button class="btn btn-ghost" id="btn-new">Nouveau document</button>
    <button class="btn" id="btn-sign">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      Signer
    </button>
    <button class="btn btn-primary" id="btn-download">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Télécharger
    </button>
  </div>
  <div id="sign-hint">Cliquez à l'endroit où vous voulez apposer votre signature — Echap pour annuler</div>
  <div id="viewer"></div>
</div>

<!-- ══ SIGNATURE MODAL ════════════════════════ -->
<div id="sig-modal">
  <div id="sig-box">
    <h2>Dessinez votre signature</h2>
    <div id="sig-canvas-wrap">
      <canvas id="sig-canvas" width="380" height="148"></canvas>
      <span class="sig-placeholder" id="sig-placeholder">Signez ici</span>
    </div>
    <div id="sig-footer">
      <button class="btn btn-ghost" id="btn-clear">Effacer</button>
      <div class="right">
        <button class="btn btn-ghost" id="btn-cancel">Annuler</button>
        <button class="btn btn-primary" id="btn-confirm">Placer la signature</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const SCALE       = 1.5;   // render scale
const SIG_W_PT    = 150;   // signature width  in PDF points
const SIG_H_PT    = 56;    // signature height in PDF points

// ── STATE ───────────────────────────────────────────────────────────────────
let pdfDoc      = null;
let pdfBytes    = null;
let sigMode     = false;
let pendingPos  = null;   // { pageIndex, xPt, yPtTop }
let sigPad      = null;
let signatures  = [];     // { pageIndex, xPt, yPtTop, dataUrl }

// ── DOM ─────────────────────────────────────────────────────────────────────
const uploadScreen  = document.getElementById('upload-screen');
const editorScreen  = document.getElementById('editor-screen');
const dropZone      = document.getElementById('drop-zone');
const fileInput     = document.getElementById('file-input');
const viewer        = document.getElementById('viewer');
const signHint      = document.getElementById('sign-hint');
const fileNameEl    = document.getElementById('file-name');
const btnNew        = document.getElementById('btn-new');
const btnSign       = document.getElementById('btn-sign');
const btnDownload   = document.getElementById('btn-download');
const sigModal      = document.getElementById('sig-modal');
const sigCanvas     = document.getElementById('sig-canvas');
const sigPlaceholder= document.getElementById('sig-placeholder');
const btnClear      = document.getElementById('btn-clear');
const btnCancel     = document.getElementById('btn-cancel');
const btnConfirm    = document.getElementById('btn-confirm');
const loading       = document.getElementById('loading');

// ── FILE INPUT ───────────────────────────────────────────────────────────────
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

async function handleFile(file) {
  showLoading('Chargement…');
  fileNameEl.textContent = file.name;
  const ext = file.name.split('.').pop().toLowerCase();

  try {
    let bytes;
    if (ext === 'pdf') {
      bytes = await file.arrayBuffer();
    } else {
      const fd = new FormData();
      fd.append('doc', file);
      const resp = await fetch('/convert', { method: 'POST', body: fd });
      if (!resp.ok) throw new Error(await resp.text());
      bytes = await resp.arrayBuffer();
    }
    pdfBytes = new Uint8Array(bytes);
    await renderDoc(pdfBytes);
    showEditor();
  } catch (err) {
    alert('Erreur : ' + err.message);
  } finally {
    hideLoading();
  }
}

// ── PDF RENDER ───────────────────────────────────────────────────────────────
async function renderDoc(bytes) {
  // .slice() to avoid PDF.js detaching the original ArrayBuffer
  pdfDoc = await pdfjsLib.getDocument({ data: bytes.slice() }).promise;
  viewer.innerHTML = '';
  signatures = [];
  for (let i = 1; i <= pdfDoc.numPages; i++) await renderPage(i);
}

async function renderPage(num) {
  const page = await pdfDoc.getPage(num);
  const vp   = page.getViewport({ scale: SCALE });

  const wrap   = document.createElement('div');
  wrap.className = 'page-wrap';
  wrap.style.width  = vp.width  + 'px';
  wrap.style.height = vp.height + 'px';

  const canvas = document.createElement('canvas');
  canvas.className = 'page-canvas';
  canvas.width  = vp.width;
  canvas.height = vp.height;

  const layer = document.createElement('div');
  layer.className = 'sig-layer';
  layer.dataset.page = num - 1;
  layer.addEventListener('click', onLayerClick);

  wrap.append(canvas, layer);
  viewer.appendChild(wrap);
  await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
}

// ── SIGN MODE ────────────────────────────────────────────────────────────────
btnSign.addEventListener('click', toggleSignMode);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (sigModal.classList.contains('open')) closeSigModal();
    else if (sigMode) toggleSignMode();
  }
});

function toggleSignMode() {
  sigMode = !sigMode;
  viewer.classList.toggle('sign-mode', sigMode);
  btnSign.classList.toggle('active', sigMode);
  signHint.classList.toggle('show', sigMode);

  const icon = btnSign.querySelector('svg');
  if (sigMode) {
    btnSign.lastChild.textContent = ' Annuler';
  } else {
    btnSign.lastChild.textContent = ' Signer';
  }
}

function onLayerClick(e) {
  if (!sigMode) return;
  const pageIndex = parseInt(e.currentTarget.dataset.page);
  const rect = e.currentTarget.getBoundingClientRect();
  const xPt    = (e.clientX - rect.left)  / SCALE;
  const yPtTop = (e.clientY - rect.top)   / SCALE;
  pendingPos = { pageIndex, xPt, yPtTop };
  openSigModal();
}

// ── SIGNATURE PAD ─────────────────────────────────────────────────────────
function openSigModal() {
  if (!sigPad) {
    sigPad = new SignaturePad(sigCanvas, {
      penColor: '#000000',
      backgroundColor: 'rgba(0,0,0,0)',
      minWidth: 1.2,
      maxWidth: 2.8,
      velocityFilterWeight: 0.7,
    });
    sigPad.addEventListener('beginStroke', () => {
      sigPlaceholder.classList.add('hidden');
    });
  } else {
    sigPad.clear();
    sigPlaceholder.classList.remove('hidden');
  }
  sigModal.classList.add('open');
}

function closeSigModal() {
  sigModal.classList.remove('open');
  pendingPos = null;
}

btnClear.addEventListener('click', () => {
  sigPad && sigPad.clear();
  sigPlaceholder.classList.remove('hidden');
});
btnCancel.addEventListener('click', closeSigModal);

btnConfirm.addEventListener('click', () => {
  if (!sigPad || sigPad.isEmpty()) { alert('Dessinez votre signature d\'abord.'); return; }
  const pos    = pendingPos;   // snapshot before closeSigModal resets it
  const dataUrl = trimmedDataUrl(sigCanvas);
  closeSigModal();
  if (pos) placeSig(pos, dataUrl);
  if (sigMode) toggleSignMode();
});

// trim transparent pixels for a tighter signature image
function trimmedDataUrl(src) {
  // Copy to a fresh canvas with willReadFrequently (getImageData perf)
  const copy    = document.createElement('canvas');
  copy.width    = src.width;
  copy.height   = src.height;
  const copyCtx = copy.getContext('2d', { willReadFrequently: true });
  copyCtx.drawImage(src, 0, 0);
  const ctx  = copyCtx;
  const { width: W, height: H } = copy;
  const data = ctx.getImageData(0, 0, W, H).data;
  let t = H, l = W, r = 0, b = 0;
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      if (data[(y * W + x) * 4 + 3] > 8) {
        if (y < t) t = y; if (y > b) b = y;
        if (x < l) l = x; if (x > r) r = x;
      }
    }
  }
  if (t > b) return src.toDataURL('image/png'); // empty, return as-is
  const pad = 10;
  const out = document.createElement('canvas');
  out.width  = r - l + pad * 2;
  out.height = b - t + pad * 2;
  out.getContext('2d').drawImage(copy, l - pad, t - pad, out.width, out.height, 0, 0, out.width, out.height);
  return out.toDataURL('image/png');
}

// ── PLACE SIGNATURE ──────────────────────────────────────────────────────────
function placeSig({ pageIndex, xPt, yPtTop }, dataUrl) {
  // center on click
  const xAdj = xPt - SIG_W_PT / 2;
  const yAdj = yPtTop - SIG_H_PT / 2;

  const sig = { pageIndex, xPt: xAdj, yPtTop: yAdj, dataUrl };
  signatures.push(sig);
  renderSigEl(sig);
}

function renderSigEl(sig) {
  const layers = document.querySelectorAll('.sig-layer');
  const layer  = layers[sig.pageIndex];
  if (!layer) return;

  const el = document.createElement('div');
  el.className = 'sig-item';
  el.style.left   = (sig.xPt * SCALE) + 'px';
  el.style.top    = (sig.yPtTop * SCALE) + 'px';
  el.style.width  = (SIG_W_PT * SCALE) + 'px';
  el.style.height = (SIG_H_PT * SCALE) + 'px';

  const img = document.createElement('img');
  img.src = sig.dataUrl;

  const del = document.createElement('button');
  del.className = 'sig-del';
  del.textContent = '×';
  del.title = 'Supprimer';
  del.addEventListener('click', () => {
    signatures.splice(signatures.indexOf(sig), 1);
    el.remove();
  });

  el.append(img, del);
  makeDraggable(el, sig);
  layer.appendChild(el);
}

function makeDraggable(el, sig) {
  let ox, oy, sl, st;
  el.addEventListener('mousedown', e => {
    if (e.target.classList.contains('sig-del')) return;
    e.preventDefault();
    ox = e.clientX; oy = e.clientY;
    sl = parseInt(el.style.left); st = parseInt(el.style.top);

    const move = e => {
      const nl = sl + (e.clientX - ox);
      const nt = st + (e.clientY - oy);
      el.style.left = nl + 'px';
      el.style.top  = nt + 'px';
      sig.xPt    = nl / SCALE;
      sig.yPtTop = nt / SCALE;
    };
    const up = () => {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
    };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
}

// ── DOWNLOAD ─────────────────────────────────────────────────────────────────
btnDownload.addEventListener('click', downloadSigned);

async function downloadSigned() {
  if (!pdfBytes) return;

  if (signatures.length === 0) {
    triggerDownload(new Blob([pdfBytes], { type: 'application/pdf' }), outName());
    return;
  }

  showLoading('Génération du PDF…');
  try {
    const { PDFDocument } = PDFLib;
    const doc   = await PDFDocument.load(pdfBytes);
    const pages = doc.getPages();

    for (const sig of signatures) {
      const page         = pages[sig.pageIndex];
      const { height: H } = page.getSize();

      const imgBytes  = dataUrlToBytes(sig.dataUrl);
      const pngImage  = await doc.embedPng(imgBytes);

      // pdf-lib origin = bottom-left; PDF.js origin = top-left
      const yBottom = H - sig.yPtTop - SIG_H_PT;

      page.drawImage(pngImage, {
        x: sig.xPt,
        y: yBottom,
        width:  SIG_W_PT,
        height: SIG_H_PT,
      });
    }

    const saved = await doc.save();
    triggerDownload(new Blob([saved], { type: 'application/pdf' }), outName());
  } catch (err) {
    console.error(err);
    alert('Erreur lors de la génération : ' + err.message);
  } finally {
    hideLoading();
  }
}

function dataUrlToBytes(dataUrl) {
  const b64  = dataUrl.split(',')[1];
  const bin  = atob(b64);
  const arr  = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

function outName() {
  const base = fileNameEl.textContent.replace(/\.[^.]+$/, '');
  return base + '_signé.pdf';
}

function triggerDownload(blob, name) {
  const url = URL.createObjectURL(blob);
  const a   = Object.assign(document.createElement('a'), { href: url, download: name });
  a.click();
  URL.revokeObjectURL(url);
}

// ── UI HELPERS ───────────────────────────────────────────────────────────────
function showEditor() {
  uploadScreen.style.display = 'none';
  editorScreen.style.display = 'flex';
}

btnNew.addEventListener('click', () => {
  pdfDoc = null; pdfBytes = null; signatures = [];
  sigMode = false;
  viewer.classList.remove('sign-mode');
  viewer.innerHTML = '';
  signHint.classList.remove('show');
  editorScreen.style.display = 'none';
  uploadScreen.style.display = 'flex';
  fileInput.value = '';
  fileNameEl.textContent = '';
});

function showLoading(msg) {
  loading.textContent = msg || '…';
  loading.classList.add('show');
}
function hideLoading() { loading.classList.remove('show'); }
</script>
</body>
</html>
